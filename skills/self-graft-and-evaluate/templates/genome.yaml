# Fallback genome — write this ONLY when `agm init` cannot infer enough from
# the repository. Replace every <PLACEHOLDER>. Do not invent capabilities the
# code cannot actually perform.
#
# `agm validate` is authoritative for the accepted literals. This template uses
# what today's CLI accepts: `spec_version: '0.2'` and a criticality from
# low|medium|high|critical. The published spec writes the version as
# `agenomic/v0.2` and uses standard|sensitive|regulated_customer_facing|
# life_critical — if your installed CLI/spec expects those, switch them.
spec_version: '0.2'

agent:
  id: agent://<org>/<name>          # agent://<org>/<name>
  name: <Agent Display Name>
  domain: <domain>                  # e.g. claims, support, trading-risk
  criticality: medium               # low | medium | high | critical

runtime:
  model_provider: <provider>
  model_id: <model-id>
  temperature: 0.2

tools:
  - name: <tool_name>
    protocol: mcp                   # mcp | http | grpc | local
    server: <server-uri>
    version: <semver>

skills:
  - name: <skill_id>
    prompt_path: prompts/skills/<skill_id>.md

knowledge: []                       # [] when the agent has no retrieval corpus

policies:
  - id: <policy_id>
    path: policies/<file>.md
    severity: high                  # info | low | medium | high | critical

memory:
  design_memory: memory/memory.schema.yaml
  runtime_memory_schema_version: 1.0.0

# ---- Optional v0.2 orchestration-facing fields (RFC 0009) ----
# Declare these when the agent participates in workflows or multi-agent
# systems. Delete any block that does not apply to this agent.
triggers:
  - type: api                       # api | event | schedule | signal | manual
    description: <how a run of this agent starts>
autonomy:
  allowed_actions: [<action_the_agent_may_take_alone>]
  forbidden_actions: [<action_it_must_never_take_alone>]
guardrails: [<named_output_guardrail>]   # e.g. formal_address, no_payment_commitment
escalation_rules:
  - condition: <free_form_condition>      # e.g. bodily_injury, suspected_fraud
    route: <human_role_or_queue>
collaboration:
  member_of: [system://<org>/<system-name>]
  hand_off_to: [agent://<org>/<downstream-agent>]
  accepts_handoffs_from: [agent://<org>/<upstream-agent>]

forbidden_decisions:
  - <decision_the_agent_must_never_make>

labels:
  team: <team>
